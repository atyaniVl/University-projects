<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>art gallery system prototype</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@4.2.1/dist/aframe-event-set-component.min.js"></script>
</head>
<body>
  <a-scene>
    <a-entity environment="preset: goldmine; dressingAmount: 0" position="0 -50 0"></a-entity>
    <a-camera
      id="myPOV"
      position="0 14 -2">
      <a-cursor color="black"></a-cursor>
    </a-camera>
    <a-assets>
      <!-- ground textures -->
      <img id="groundDiff" src="wood_table_001_2k/textures/wood_table_001_diff_2k.jpg">
      <img id="groundAO" src="wood_table_001_2k/textures/wood_table_001_ao_2k.jpg">
      <img id="groundRoughness" src="wood_table_001_2k/textures/wood_table_001_rough_2k.jpg">
      <img id="groundNormal" src="wood_table_001_2k/textures/wood_table_001_nor_gl_2k.jpg">
      <!-- walls textrures -->
      <img id="preconcreteDiff" src="preconcrete_wall/preconcrete_wall_001_diff_1k.jpg">
      <img id="preconcreteAO" src="preconcrete_wall/preconcrete_wall_001_ao_1k.jpg">
      <img id="preconcreteRoughness" src="preconcrete_wall/preconcrete_wall_001_rough_1k.jpg">
      <img id="preconcreteNormal" src="preconcrete_wall/preconcrete_wall_001_nor_gl_1k.jpg">    
      <!-- walls textures -->
      <img id="concreteDiff" src="concrete_wall/concrete_wall_004_diff_1k.jpg">
      <img id="concreteAO" src="concrete_wall/concrete_wall_004_ao_1k.jpg">
      <img id="concreteRoughness" src="concrete_wall/concrete_wall_004_rough_1k.jpg">
      <img id="concreteNormal" src="concrete_wall/concrete_wall_004_nor_gl_1k.jpg">
      <!-- 3d objects -->
      <a-asset-item id="stand" src="3d objects/3d objects stand/stand.gltf"></a-asset-item>
      <a-asset-item id="computer" src="3d objects/computer/computer.gltf"></a-asset-item>
      <a-asset-item id="donut" src="3d objects/donuts/donut revenge.gltf"></a-asset-item>
      <a-asset-item id="dizzy" src="3d objects/gekko budies/dizzy.gltf"></a-asset-item>
      <a-asset-item id="wingy" src="3d objects/gekko budies/wing.gltf"></a-asset-item>
      <a-asset-item id="thrash" src="3d objects/gekko budies/thrash.gltf"></a-asset-item>
      <a-asset-item id="mosh" src="3d objects/gekko budies/mosh.gltf"></a-asset-item>
      <a-asset-item id="island" src="3d objects/island/island.gltf"></a-asset-item>
      <a-asset-item id="car" src="3d objects/low poly car/low poly car.gltf"></a-asset-item>
      <a-asset-item id="robot" src="3d objects/robot/robot.gltf"></a-asset-item>
      <a-asset-item id="room" src="3d objects/room/room.gltf"></a-asset-item>
      <a-asset-item id="door" src="3d objects/door/door.gltf"></a-asset-item>
    </a-assets>
  <!-- building 1-->
    <a-entity
      position="0 10 -35">            
<!-- ground in floor 1-->
      <a-plane
        rotation="-90" 
        width="40" height="70" repeat="10 10"
        material="src: #groundDiff; ambientOcclusionMap: #groundAO;
        normal-map: #groundNormal; roughness:#groundRoughness; side: double">
      </a-plane>
<!-- ceil in floor 1 -->
      <a-plane
        position="0 9.09 0"
        rotation="90" 
        width="40" height="70" repeat="10 10"
        material="color: #3b3b3b; side: double"
        roughness="1">
      </a-plane>
<!-- right side wall -->
      <a-plane
        position="20 5"
        rotation="0 -90"
        width="70" height="10" repeat="15 3"
        material="src:#preconcreteDiff; ambientOcclusionMap:#preconcreteAO;
        normal-map:#preconcreteNormal; roughness: #preconcreteRoughness; side: double"  >
      </a-plane>
<!-- left side wall -->
      <a-plane
        position="-20 5"
        rotation="0 90"
        width="70" height="10" repeat="15 3"
        material="src:#preconcreteDiff; ambientOcclusionMap:#preconcreteAO;
        normal-map:#preconcreteNormal; roughness: #preconcreteRoughness; side: double">
      </a-plane>
<!-- back side wall -->
      <a-plane
        position="0 5 -35"
        width="40" height="10" repeat="10 3"
        material="src:#preconcreteDiff; ambientOcclusionMap:#preconcreteAO;
        normal-map:#preconcreteNormal; roughness: #preconcreteRoughness; side: double">
      </a-plane>
<!-- front side wall -->
      <a-plane
        position="0 5 35"
        rotation="0 180"
        width="40" height="10" repeat="10 3"
        material="src:#preconcreteDiff; ambientOcclusionMap:#preconcreteAO;
        normal-map:#preconcreteNormal; roughness: #preconcreteRoughness; side: double">
      </a-plane>
<!-- door -->
      <a-entity 
        gltf-model="#door" scale="3.5 3.5 3.5" position="0 0 -35"
        event-set__positioning="_event: click; _target:#myPOV; position:100 14 -2">
        <a-entity
          text="value: Welcome to floor 1
          press to change the floor"
          position="1 1 1.5"
          scale="3 3 3">
        </a-entity>
      </a-entity>
<!-- renders -->
      <a-entity>
        <a-entity
          position="19.9 5">
          <a-image src="3d objects/computer/computer.jpg" 
            scale="3 3" position="0 0 25" rotation="0 -90 0"
            event-set__enter="_event:mouseenter; _target:#compTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#compTXT; visible:false">
            <a-entity
            id="compTXT"
              text="value:5-Oct-23
              this is a computer
              with gamify modeling
              with a simple ao edges and 
              colorful material"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/robot/robot.jpg"
            scale="3 3" position="0 0 13" rotation="0 -90 0"
            event-set__enter="_event:mouseenter; _target:#botTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#botTXT; visible:false">
            <a-entity
            id="botTXT"
              text="value:5-Oct-23
              this is a small AI
              robot model"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/low poly car/untitled.png" 
            scale="6 3" position="0 0 1" rotation="0 -90 0"
            event-set__enter="_event:mouseenter; _target:#carTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#carTXT; visible:false">
            <a-entity
            id="carTXT"
              text="value:21-Sep-23
              low polygon car that 
              I tried to model"
              position="1" scale="1 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/donuts/img.png" 
            scale="3 3" position="0 0 -11" rotation="0 -90 0"
            event-set__enter="_event:mouseenter; _target:#donutTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#donutTXT; visible:false">
            <a-entity
            id="donutTXT"
              text="value:3-march-23
              do or donut ^_^
              my donut 3d model"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>

          <a-image src="3d objects/island/sameer.png" 
            scale="3 3" position="0 0 -23" rotation="0 -90 0"
            event-set__enter="_event:mouseenter; _target:#islandTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#islandTXT; visible:false">
            <a-entity
            id="islandTXT"
              text="value:27-Dec-23
              my little island 
              with some particles"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>

        </a-entity>
        <a-entity
          position="-19.9 5">
          <a-image src="3d objects/gekko budies/dizzy.jpg"
            scale="3 3" position="0 0 25" rotation="0 90 0"
            event-set__enter="_event:mouseenter; _target:#dizzyTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#dizzyTXT; visible:false">
            <a-entity
            id="dizzyTXT"
              text="value:16-Sep-23
              watch out flash!!
              dizzy is a character
              from VALORANT"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/gekko budies/wing.jpg"
            scale="3 3" position="0 0 13" rotation="0 90 0"
            event-set__enter="_event:mouseenter; _target:#wingTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#wingTXT; visible:false">
            <a-entity
            id="wingTXT"
              text="value:16-Sep-23
              wingman is planting!
              wingman is a character 
              from VALORANT"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/gekko budies/thrash.jpg"
            scale="3 3" position="0 0 1" rotation="0 90 0"
            event-set__enter="_event:mouseenter; _target:#thrashTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#thrashTXT; visible:false">
            <a-entity
            id="thrashTXT"
              text="value:16-Sep-23
              you are freezed!
              thrash is a character 
              from VALORANT"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/gekko budies/mosh.jpg"
            scale="3 3" position="0 0 -11" rotation="0 90 0"
            event-set__enter="_event:mouseenter; _target:#moshTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#moshTXT; visible:false">
            <a-entity
            id="moshTXT"
              text="value:16-Sep-23
              see under your legs!
              mosh is a character 
              from VALORANT"
              position="2" scale="3 3 3"
              visible="false">
            </a-entity>
          </a-image>
          <a-image src="3d objects/room/iso night render2.png"
            scale="6 3" position="0 0 -23" rotation="0 90 0"
            event-set__enter="_event:mouseenter; _target:#roomTXT; visible:true"
            event-set__leave="_event:mouseleave; _target:#roomTXT; visible:false">
            <a-entity
            id="roomTXT"
              text="value:28-Nov-23
              isometric room I model
              recently"
              position="1" scale="1 3 3"
              visible="false">
            </a-entity>
          </a-image>
        </a-entity>
      </a-entity>
    </a-entity>
<!-- building 2-->
    <a-entity
      position="100 10 -35">
<!-- ground in floor 2 -->
      <a-plane
        position="0 0 0"
        rotation="-90" 
        width="40" height="70" repeat="10 10"
        material="src: #groundDiff; ambientOcclusionMap: #groundAO;
        normal-map: #groundNormal; roughness:#groundRoughness; side: double">
      </a-plane>
<!-- ceil in floor 2 -->
      <a-plane
        position="0 10 0"
        rotation="90" 
        width="40" height="70" repeat="10 10"
        material="color: #3b3b3b; side: double"
        roughness="1">
      </a-plane>
<!-- front side wall -->
      <a-plane
        position="0 5 35"
        width="40" height="10" repeat="15 5"
        material="src: #concreteDiff; ambientOcclusionMap: #concreteAO;
        normal-map: #concreteNormal; roughness:#concreteRoughness; side: double">
      </a-plane>
<!-- back side wall -->
      <a-plane
        position="0 5 -35"
        width="40" height="10" repeat="15 5"
        material="src: #concreteDiff; ambientOcclusionMap: #concreteAO;
        normal-map: #concreteNormal; roughness:#concreteRoughness; side: double">
      </a-plane> 
<!-- left side wall -->
      <a-plane
        position="-20 5"
        rotation="0 90"
        width="70" height="10" repeat="30 5"
        material="src: #concreteDiff; ambientOcclusionMap: #concreteAO;
        normal-map: #concreteNormal; roughness:#concreteRoughness; side: double">
      </a-plane>
<!-- right side wall -->
      <a-plane
        position="20 5"
        rotation="0 -90"
        width="70" height="10" repeat="30 5"
        material="src: #concreteDiff; ambientOcclusionMap: #concreteAO;
        normal-map: #concreteNormal; roughness:#concreteRoughness; side: double">
      </a-plane>
<!-- door -->
      <a-entity 
        gltf-model="#door" scale="3.5 3.5 3.5" position="0 0 -35"
        event-set__positioning="_event: click; _target:#myPOV; position:0 14 -2">
        <a-entity
          text="value: Welcome to floor 2
          press to change the floor"
          position="1 1 0.5"
          scale="3 3 3">
        </a-entity>
      </a-entity>
<!-- 3D OBJECTS -->
      <a-entity>
<!-- right 3d objects -->
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="10 -1.26 25">
          <a-entity gltf-model="#computer" scale="0.2 0.2 0.2" position="0 1.65 -0.05"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity 
          gltf-model="#stand" scale="2.5 2.5 2.5" position="10 -1.26 13">
          <a-entity gltf-model="#robot" scale="0.2 0.2 0.2" position="0 1.6 0"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="10 -1.26 1">
          <a-entity gltf-model="#car" scale="0.2 0.2 0.2" position="-0.05 1.68 -0.02"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="10 -1.26 -11">
          <a-entity gltf-model="#donut" scale="4 4 4" position="0 1.35 0" rotation="0 -90 0"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="10 -1.26 -23">
          <a-entity gltf-model="#island" scale="0.06 0.06 0.06" position="0 0.85 0"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
<!-- left 3d objects -->
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="-10 -1.26 25">
          <a-entity gltf-model="#dizzy" scale="1.5 1.5 1.5" position="0 2 -0.05"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="-10 -1.26 13">
          <a-entity gltf-model="#wingy" scale="2 2 2" position="0 2 -0.05"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="-10 -1.26 1">
          <a-entity gltf-model="#thrash" scale="2 2 2" position="0 1.9 -0.05"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="-10 -1.26 -11">
          <a-entity gltf-model="#mosh" scale="3 3 3" position="2 1.8 0.5"></a-entity>
        </a-entity>
        <a-entity
          gltf-model="#stand" scale="2.5 2.5 2.5" position="-10 -1.26 -23">
          <a-entity gltf-model="#room" scale="0.25 0.25 0.25" position="0 1.6 0"
            animation="property:rotation.y; to: 360; dur: 10000;easing: linear; loop: true"></a-entity>
        </a-entity>
      </a-entity>
    </a-entity>
<!-- lights -->
    <a-entity
      position="0 29 -35">
      <a-light type="point" intensity="0.3" position="-25 -10 15"></a-light>
      <a-light type="point" intensity="0.3" position="-25 -10 -15"></a-light>

      <a-light type="point" intensity="0.2" position="115 -12 15"></a-light>
      <a-light type="point" intensity="0.2" position="115 -12 -15"></a-light>
      <a-light type="point" intensity="0.2" position="100 -12 15"></a-light>
      <a-light type="point" intensity="0.2" position="100 -12 -15"></a-light>
    </a-entity>
  </a-scene>
</body>
</html>
